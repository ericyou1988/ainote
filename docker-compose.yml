services:
  backend:
    build: ./backend
    ports:
      - "38000:38000"
    volumes:
      - ./backend/data:/app/data
    environment:
      - APP_ENV=production
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-eFqopC2tJsW_JLEMLDs6TZHcneubdDJhAuOKgda75eA=}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "8880:8880"
    restart: unless-stopped
